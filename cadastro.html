<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro de Usuário — PontoFace</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0a0a0f;
        --surface: #13131a;
        --surface2: #1c1c28;
        --border: #2a2a3d;
        --accent: #6c63ff;
        --accent2: #a78bfa;
        --success: #10d9a0;
        --error: #ff4d6d;
        --text: #e8e8f0;
        --muted: #6b6b85;
        --font-head: "Syne", sans-serif;
        --font-body: "DM Sans", sans-serif;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-body);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px 20px;
        position: relative;
        overflow-x: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        top: -200px;
        left: -200px;
        width: 600px;
        height: 600px;
        background: radial-gradient(
          circle,
          rgba(108, 99, 255, 0.12) 0%,
          transparent 70%
        );
        pointer-events: none;
      }

      body::after {
        content: "";
        position: fixed;
        bottom: -150px;
        right: -150px;
        width: 500px;
        height: 500px;
        background: radial-gradient(
          circle,
          rgba(16, 217, 160, 0.08) 0%,
          transparent 70%
        );
        pointer-events: none;
      }

      header {
        width: 100%;
        max-width: 560px;
        margin-bottom: 40px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .logo {
        font-family: var(--font-head);
        font-size: 22px;
        font-weight: 800;
        letter-spacing: -0.5px;
      }

      .logo span {
        color: var(--accent);
      }

      .nav-link {
        font-size: 13px;
        color: var(--muted);
        text-decoration: none;
        border: 1px solid var(--border);
        padding: 8px 16px;
        border-radius: 8px;
        transition: all 0.2s;
      }
      .nav-link:hover {
        color: var(--text);
        border-color: var(--accent);
      }

      .card {
        width: 100%;
        max-width: 560px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 36px;
        animation: fadeUp 0.5s ease both;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .card-title {
        font-family: var(--font-head);
        font-size: 26px;
        font-weight: 700;
        margin-bottom: 6px;
      }

      .card-sub {
        font-size: 14px;
        color: var(--muted);
        margin-bottom: 32px;
      }

      /* Webcam */
      .cam-wrapper {
        position: relative;
        width: 100%;
        aspect-ratio: 4/3;
        border-radius: 14px;
        overflow: hidden;
        background: var(--surface2);
        border: 2px solid var(--border);
        margin-bottom: 16px;
        transition: border-color 0.3s;
      }
      .cam-wrapper.active {
        border-color: var(--accent);
      }
      .cam-wrapper.captured {
        border-color: var(--success);
      }

      #video,
      #canvas-preview {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      #canvas-preview {
        display: none;
      }

      .cam-overlay {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        color: var(--muted);
        pointer-events: none;
      }

      .cam-overlay svg {
        opacity: 0.4;
      }

      .cam-guide {
        position: absolute;
        inset: 0;
        pointer-events: none;
        display: none;
      }

      .cam-guide.show {
        display: block;
      }

      .face-oval {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -52%);
        width: 42%;
        aspect-ratio: 3/4;
        border: 2px dashed rgba(108, 99, 255, 0.6);
        border-radius: 50%;
        animation: pulse-oval 2s ease-in-out infinite;
      }

      @keyframes pulse-oval {
        0%,
        100% {
          border-color: rgba(108, 99, 255, 0.6);
        }
        50% {
          border-color: rgba(108, 99, 255, 1);
        }
      }

      .cam-actions {
        display: flex;
        gap: 10px;
        margin-bottom: 28px;
      }

      .btn {
        flex: 1;
        padding: 13px 20px;
        border-radius: 10px;
        font-family: var(--font-body);
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        border: none;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .btn-outline {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text);
      }
      .btn-outline:hover {
        border-color: var(--accent);
        background: rgba(108, 99, 255, 0.06);
      }

      .btn-primary {
        background: var(--accent);
        color: #fff;
      }
      .btn-primary:hover {
        background: var(--accent2);
        transform: translateY(-1px);
        box-shadow: 0 8px 24px rgba(108, 99, 255, 0.35);
      }
      .btn-primary:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      .btn-success {
        background: var(--success);
        color: #0a0a0f;
        font-weight: 600;
      }
      .btn-success:hover {
        filter: brightness(1.1);
        transform: translateY(-1px);
      }
      .btn-success:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        transform: none;
      }

      .form-section {
        display: flex;
        flex-direction: column;
        gap: 18px;
      }

      .form-row {
        display: flex;
        gap: 14px;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 7px;
        flex: 1;
      }

      label {
        font-size: 12px;
        font-weight: 500;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.8px;
      }

      input {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 13px 16px;
        color: var(--text);
        font-family: var(--font-body);
        font-size: 14px;
        outline: none;
        transition: border-color 0.2s;
      }
      input:focus {
        border-color: var(--accent);
      }
      input::placeholder {
        color: var(--muted);
      }
      input[type="number"]::-webkit-inner-spin-button {
        opacity: 0.4;
      }

      .field-hint {
        font-size: 11px;
        color: var(--muted);
        margin-top: 2px;
      }

      .divider {
        height: 1px;
        background: var(--border);
        margin: 8px 0;
      }

      .section-label {
        font-size: 11px;
        font-weight: 600;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 1.2px;
        margin-bottom: -4px;
      }

      .toast {
        position: fixed;
        bottom: 32px;
        left: 50%;
        transform: translateX(-50%) translateY(80px);
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px 24px;
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 14px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        transition:
          transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
          opacity 0.3s;
        opacity: 0;
        z-index: 999;
        min-width: 280px;
      }
      .toast.show {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }
      .toast.success {
        border-color: var(--success);
      }
      .toast.error {
        border-color: var(--error);
      }
      .toast-icon {
        font-size: 20px;
      }

      .loc-status {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        color: var(--muted);
        padding: 10px 14px;
        background: var(--surface2);
        border-radius: 8px;
        border: 1px solid var(--border);
      }
      .loc-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--muted);
        flex-shrink: 0;
        transition: background 0.3s;
      }
      .loc-dot.ok {
        background: var(--success);
        box-shadow: 0 0 8px var(--success);
      }
      .loc-dot.err {
        background: var(--error);
      }

      .spinner {
        display: inline-block;
        width: 16px;
        height: 16px;
        border: 2px solid rgba(255, 255, 255, 0.2);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* DB Preview */
      #db-preview {
        margin-top: 28px;
        display: none;
      }

      .db-card {
        background: var(--surface2);
        border: 1px solid var(--success);
        border-radius: 14px;
        padding: 20px;
        animation: fadeUp 0.4s ease both;
      }

      .db-title {
        font-family: var(--font-head);
        font-size: 14px;
        color: var(--success);
        font-weight: 700;
        margin-bottom: 14px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .db-row {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        padding: 8px 0;
        border-bottom: 1px solid var(--border);
        font-size: 12px;
        gap: 12px;
      }
      .db-row:last-child {
        border-bottom: none;
      }
      .db-key {
        color: var(--muted);
        font-weight: 500;
        flex-shrink: 0;
      }
      .db-val {
        color: var(--text);
        text-align: right;
        word-break: break-all;
      }

      .foto-thumb {
        width: 60px;
        height: 60px;
        border-radius: 8px;
        object-fit: cover;
        border: 2px solid var(--success);
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">Ponto<span>Face</span></div>
      <a href="ponto.html" class="nav-link">→ Registrar Ponto</a>
    </header>

    <div class="card">
      <div class="card-title">Cadastro de Usuário</div>
      <div class="card-sub">
        Posicione o rosto na câmera e preencha os dados para criar seu perfil
        biométrico.
      </div>

      <div class="cam-wrapper" id="cam-wrapper">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas-preview"></canvas>
        <div class="cam-overlay" id="cam-overlay">
          <svg
            width="48"
            height="48"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
          >
            <path
              d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"
            />
            <circle cx="12" cy="13" r="4" />
          </svg>
          <span style="font-size: 13px">Clique em "Iniciar Câmera"</span>
        </div>
        <div class="cam-guide" id="cam-guide">
          <div class="face-oval"></div>
        </div>
      </div>

      <div class="cam-actions">
        <button class="btn btn-outline" id="btn-start">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="12" cy="12" r="10" />
            <circle cx="12" cy="12" r="3" fill="currentColor" />
          </svg>
          Iniciar Câmera
        </button>
        <button class="btn btn-primary" id="btn-capture" disabled>
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"
            />
            <circle cx="12" cy="13" r="4" />
          </svg>
          Capturar Foto
        </button>
        <button class="btn btn-outline" id="btn-retake" style="display: none">
          ↺ Nova Foto
        </button>
      </div>

      <div class="form-section">
        <div class="field">
          <label>Nome Completo</label>
          <input type="text" id="nome" placeholder="Ex: Maria Silva" />
        </div>

        <div class="divider"></div>
        <div class="section-label">📍 Localização Permitida</div>

        <div class="loc-status" id="loc-status">
          <div class="loc-dot" id="loc-dot"></div>
          <span id="loc-text">Aguardando localização...</span>
          <button
            onclick="getLocation()"
            style="
              margin-left: auto;
              background: none;
              border: none;
              color: var(--accent);
              cursor: pointer;
              font-size: 12px;
              font-family: var(--font-body);
            "
          >
            Obter
          </button>
        </div>

        <div class="form-row">
          <div class="field">
            <label>Latitude</label>
            <input
              type="number"
              id="lat"
              placeholder="-3.6880"
              step="0.000001"
            />
          </div>
          <div class="field">
            <label>Longitude</label>
            <input
              type="number"
              id="lng"
              placeholder="-40.3497"
              step="0.000001"
            />
          </div>
        </div>

        <div class="field">
          <label>Raio Permitido (metros)</label>
          <input
            type="number"
            id="raio"
            placeholder="100"
            value="100"
            min="10"
            max="5000"
          />
          <span class="field-hint"
            >Distância máxima permitida para bater ponto</span
          >
        </div>

        <button
          class="btn btn-success"
          id="btn-salvar"
          disabled
          onclick="salvarUsuario()"
        >
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <polyline points="20 6 9 17 4 12" />
          </svg>
          Cadastrar Usuário
        </button>
      </div>
    </div>

    <div id="db-preview" style="width: 100%; max-width: 560px">
      <div class="db-card">
        <div class="db-title">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <polyline points="20 6 9 17 4 12" />
          </svg>
          Usuário cadastrado — __usuarios
        </div>
        <div id="db-rows"></div>
      </div>
    </div>

    <div class="toast" id="toast">
      <span class="toast-icon" id="toast-icon"></span>
      <span id="toast-msg"></span>
    </div>

    <script>
      let stream = null;
      let fotoBase64 = null;
      const video = document.getElementById("video");
      const canvas = document.getElementById("canvas-preview");
      const ctx = canvas.getContext("2d");

      document
        .getElementById("btn-start")
        .addEventListener("click", async () => {
          try {
            stream = await navigator.mediaDevices.getUserMedia({
              video: { facingMode: "user", width: 640, height: 480 },
            });
            video.srcObject = stream;
            video.style.display = "block";
            canvas.style.display = "none";
            document.getElementById("cam-overlay").style.display = "none";
            document.getElementById("cam-guide").classList.add("show");
            document.getElementById("cam-wrapper").classList.add("active");
            document.getElementById("btn-capture").disabled = false;
            document.getElementById("btn-start").disabled = true;
          } catch (e) {
            showToast(
              "error",
              "❌",
              "Não foi possível acessar a câmera. Verifique as permissões.",
            );
          }
        });

      document.getElementById("btn-capture").addEventListener("click", () => {
        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;
        ctx.drawImage(video, 0, 0);
        fotoBase64 = canvas.toDataURL("image/jpeg", 0.85);

        video.style.display = "none";
        canvas.style.display = "block";
        if (stream) stream.getTracks().forEach((t) => t.stop());

        document.getElementById("cam-wrapper").classList.remove("active");
        document.getElementById("cam-wrapper").classList.add("captured");
        document.getElementById("cam-guide").classList.remove("show");
        document.getElementById("btn-capture").style.display = "none";
        document.getElementById("btn-retake").style.display = "flex";

        checkSalvar();
        showToast("success", "📸", "Foto capturada com sucesso!");
      });

      document
        .getElementById("btn-retake")
        .addEventListener("click", async () => {
          fotoBase64 = null;
          video.style.display = "block";
          canvas.style.display = "none";
          document.getElementById("cam-wrapper").classList.remove("captured");
          document.getElementById("cam-wrapper").classList.add("active");
          document.getElementById("cam-guide").classList.add("show");
          document.getElementById("btn-capture").style.display = "flex";
          document.getElementById("btn-retake").style.display = "none";
          document.getElementById("btn-capture").disabled = false;

          try {
            stream = await navigator.mediaDevices.getUserMedia({
              video: { facingMode: "user", width: 640, height: 480 },
            });
            video.srcObject = stream;
          } catch (e) {}
          checkSalvar();
        });

      function getLocation() {
        const dot = document.getElementById("loc-dot");
        const txt = document.getElementById("loc-text");
        dot.style.background = "var(--accent)";
        txt.textContent = "Obtendo localização...";

        navigator.geolocation.getCurrentPosition(
          (pos) => {
            document.getElementById("lat").value =
              pos.coords.latitude.toFixed(6);
            document.getElementById("lng").value =
              pos.coords.longitude.toFixed(6);
            dot.classList.add("ok");
            txt.textContent = `Lat: ${pos.coords.latitude.toFixed(4)}, Lng: ${pos.coords.longitude.toFixed(4)}`;
            checkSalvar();
          },
          (err) => {
            dot.classList.add("err");
            txt.textContent =
              "Erro ao obter localização. Preencha manualmente.";
          },
        );
      }

      window.addEventListener("load", getLocation);

      function checkSalvar() {
        const ok =
          fotoBase64 &&
          document.getElementById("nome").value.trim() &&
          document.getElementById("lat").value &&
          document.getElementById("lng").value;
        document.getElementById("btn-salvar").disabled = !ok;
      }

      ["nome", "lat", "lng", "raio"].forEach((id) => {
        document.getElementById(id).addEventListener("input", checkSalvar);
      });

      function salvarUsuario() {
        const nome = document.getElementById("nome").value.trim();
        const lat = parseFloat(document.getElementById("lat").value);
        const lng = parseFloat(document.getElementById("lng").value);
        const raio = parseInt(document.getElementById("raio").value) || 100;

        if (!nome || !fotoBase64 || isNaN(lat) || isNaN(lng)) {
          showToast(
            "error",
            "⚠️",
            "Preencha todos os campos e capture a foto.",
          );
          return;
        }

        const btn = document.getElementById("btn-salvar");
        btn.innerHTML = '<span class="spinner"></span> Salvando...';
        btn.disabled = true;

        setTimeout(() => {
          const id = Math.floor(Math.random() * 90000) + 10000;
          const agora = new Date().toISOString().replace("T", " ").slice(0, 19);

          const usuarios = JSON.parse(
            localStorage.getItem("__usuarios") || "[]",
          );
          const usuario = {
            __id: id,
            nome,
            foto_referencia_url: fotoBase64,
            latitude_permitida: lat,
            longitude_permitida: lng,
            raio_permitido_metros: raio,
            data_cadastro: agora,
          };
          usuarios.push(usuario);
          localStorage.setItem("__usuarios", JSON.stringify(usuarios));

          mostrarDB(usuario);
          showToast("success", "✅", `${nome} cadastrado com sucesso!`);

          btn.innerHTML = "✓ Cadastrado!";
          btn.style.background = "var(--success)";
        }, 1200);
      }

      function mostrarDB(u) {
        const preview = document.getElementById("db-preview");
        const rows = document.getElementById("db-rows");
        preview.style.display = "block";

        rows.innerHTML = `
      <div class="db-row"><span class="db-key">__id</span><span class="db-val">${u.__id}</span></div>
      <div class="db-row"><span class="db-key">nome</span><span class="db-val">${u.nome}</span></div>
      <div class="db-row">
        <span class="db-key">foto_referencia_url</span>
        <span class="db-val"><img class="foto-thumb" src="${u.foto_referencia_url}"/></span>
      </div>
      <div class="db-row"><span class="db-key">latitude_permitida</span><span class="db-val">${u.latitude_permitida}</span></div>
      <div class="db-row"><span class="db-key">longitude_permitida</span><span class="db-val">${u.longitude_permitida}</span></div>
      <div class="db-row"><span class="db-key">raio_permitido_metros</span><span class="db-val">${u.raio_permitido_metros} m</span></div>
      <div class="db-row"><span class="db-key">data_cadastro</span><span class="db-val">${u.data_cadastro}</span></div>
    `;

        preview.scrollIntoView({ behavior: "smooth", block: "nearest" });
      }

      function showToast(type, icon, msg) {
        const t = document.getElementById("toast");
        document.getElementById("toast-icon").textContent = icon;
        document.getElementById("toast-msg").textContent = msg;
        t.className = `toast ${type} show`;
        setTimeout(() => (t.className = "toast"), 3500);
      }
    </script>
  </body>
</html>
